name: DevSecOps Engine — Build, Scan, Monitor & Deploy

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: devsecops-${{ github.ref_name }}
  cancel-in-progress: false

jobs:

  # ============================================================
  # JOB 1 — PYTHON QUALITY CHECK
  # ============================================================
  python-lint:
    name: Python Code Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint bandit pip-audit
          
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run Pylint Analysis
        run: |
          PY_FILES=$(git ls-files '*.py')

          if [ -n "$PY_FILES" ]; then
            pylint $PY_FILES --fail-under=7.0
          else
            echo "No Python files found."
          fi

      - name: Run Bandit Security Scan
        run: |
          bandit -r . -ll

      - name: Run Dependency Vulnerability Scan
        run: |
          pip-audit || true

  # ============================================================
  # JOB 2 — WEB VALIDATION & LIGHTHOUSE
  # ============================================================
  web-audit:
    name: Web Validation & Performance Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Web Tools
        run: |
          npm install -g html-validate serve @lhci/cli

      - name: Validate HTML
        run: |
          html-validate "*.html" || echo "HTML warnings detected."

      - name: Run Lighthouse Audit
        run: |
          lhci autorun
        continue-on-error: true

  # ============================================================
  # JOB 3 — FILESYSTEM & IaC SECURITY SCAN
  # ============================================================
  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ============================================================
  # JOB 4 — DOCKER BUILD & IMAGE SCAN
  # ============================================================
  docker-build:
    name: Build & Scan Docker Image
    runs-on: ubuntu-latest
    needs:
      - python-lint
      - web-audit
      - security-scan

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub Login
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Validate Docker Compose
        run: |
          if [ -f docker-compose.yml ] || [ -f compose.yaml ]; then
            docker compose config
          else
            echo "No docker compose file found."
          fi

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}

          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cjp-blog:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cjp-blog:${{ github.sha }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "${{ secrets.DOCKERHUB_USERNAME }}/cjp-blog:latest"
          format: "table"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

  # ============================================================
  # JOB 5 — DEPLOY STATIC FRONTEND
  # ============================================================
  deploy-pages:
    name: Deploy Frontend to GitHub Pages
    runs-on: ubuntu-latest
    needs: docker-build

    if: github.ref == 'refs/heads/main'

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Inject Build Metadata
        run: |
          BUILD_DATE=$(date -u "+%B %d, %Y %H:%M UTC")
          SHORT_SHA="${GITHUB_SHA::7}"

          if [ -f index.html ]; then
            sed -i "s|Est. May 2026|Est. May 2026 · Build ${SHORT_SHA} · ${BUILD_DATE}|g" index.html
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment Summary
        run: |
          echo "## 🚀 DevSecOps Pipeline Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend URL: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- Docker Image: ${{ secrets.DOCKERHUB_USERNAME }}/cjp-blog:latest" >> $GITHUB_STEP_SUMMARY
          echo "- Commit SHA: ${GITHUB_SHA::7}" >> $GITHUB_STEP_SUMMARY
          echo "- Monitoring Stack: External VPS/EC2 Required" >> $GITHUB_STEP_SUMMARY
