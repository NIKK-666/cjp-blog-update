name: CD — Deploy to GitHub Pages

on:
  push:
    branches: [main]          # Only deploy from main branch
  workflow_dispatch:           # Allow manual trigger from GitHub UI

# Allow only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build (prepare artifacts)
  # ─────────────────────────────────────────
  build:
    name: Build Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Inject build metadata into HTML
        run: |
          # Stamp the build date into the footer for traceability
          BUILD_DATE=$(date -u "+%B %d, %Y %H:%M UTC")
          COMMIT_SHA="${GITHUB_SHA::7}"
          sed -i "s|Est. May 2026|Est. May 2026 · Build: ${COMMIT_SHA} · ${BUILD_DATE}|" index.html

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'         # Upload entire repo root as the site

  # ─────────────────────────────────────────
  # JOB 2: Deploy to GitHub Pages
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build             # Only runs after build succeeds
    runs-on: ubuntu-latest

    # Required permissions for GitHub Pages deployment
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Post deployment summary
        run: |
          echo "## 🪳 CJP Blog Deployed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${GITHUB_SHA::7}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${GITHUB_REF_NAME}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed at:** $(date -u)" >> $GITHUB_STEP_SUMMARY
