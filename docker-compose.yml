name: Docker CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t monitoring-project .

    - name: Run Container Test
      run: docker run -d -p 5000:5000 monitoring-project
